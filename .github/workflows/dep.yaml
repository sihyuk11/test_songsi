name: Build And Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t sihyuk11/test_dep:v1 .

      - name: Push Docker Image
        run: |
          docker push sihyuk11/test_dep:v1

      - name: Deploy Kubernetes
        run: |
          export KUBECONFIG=/home/test/.kube/config

          cd /DATA/project10/k8s

          docker pull sihyuk11/test_dep:v1

          kubectl apply -f deploy.yml

          kubectl apply -f svc.yml

          kubectl rollout restart deployment dep-test3

          kubectl rollout status deployment dep-test3

