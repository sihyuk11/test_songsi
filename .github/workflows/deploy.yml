name: CI-CD Docker Build Push

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker Build
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/test_songsi:latest .

      - name: Docker Push
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/test_songsi:latest
